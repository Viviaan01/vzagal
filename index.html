<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Iniciar Sesión - IngesTeam</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <style>
      :root {
        --pastel-pink: #fce4ec;
        --medium-pink: #f8bbd0;
        --dark-pink: #f06292;
        --text-pink: #880e4f;
      }

      body {
        background-color: var(--pastel-pink);
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      }

      #main {
        width: 100%;
      }

      .login-card {
        background: white;
        border: none !important;
        border-radius: 20px !important;
        box-shadow: 0 10px 25px rgba(240, 98, 146, 0.15) !important;
      }

      .display-6 {
        color: var(--text-pink);
        font-weight: 800 !important; /* Letras negritas para el título */
      }

      .form-label {
        color: var(--text-pink);
        font-weight: 600;
        font-size: 0.9rem;
      }

      /* Quitar el foco azul y ponerlo rosa */
      .form-control:focus {
        border-color: var(--dark-pink) !important;
        box-shadow: 0 0 0 0.25rem rgba(240, 98, 146, 0.25) !important;
        outline: none;
      }

      .btn-pastel {
        background-color: var(--dark-pink);
        color: white;
        border: none;
        font-weight: bold;
        border-radius: 25px;
        padding: 10px 25px;
        transition: 0.3s;
      }

      .btn-pastel:hover {
        background-color: #e91e63;
        color: white;
        transform: scale(1.05);
      }

      a {
        color: var(--dark-pink);
        text-decoration: none;
        font-weight: 600;
      }

      a:hover {
        color: var(--text-pink);
        text-decoration: underline;
      }

      .text-muted {
        color: #ad748e !important;
      }
    </style>
  </head>
  <body>
    <main id="main">
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-md-7 col-lg-4">
            
            <div class="login-card p-5">
              <div class="w-100 text-center mb-4">
                <h1 class="display-6">Iniciar Sesión</h1>
                <p class="text-muted small">Use sus credenciales de IngesTeam</p>
              </div>

              <div class="col-12">
                <div class="mb-3">
                  <label for="email" class="form-label">Email</label>
                  <input type="email" class="form-control" id="email" placeholder="nombre@ejemplo.com">
                </div>
                
                <div class="mb-4">
                  <label for="pwd" class="form-label">Contraseña</label>
                  <input type="password" class="form-control" id="pwd" placeholder="••••••••">
                </div>

                <div class="d-grid gap-2 mb-3">
                  <button class="btn btn-pastel" onclick="login();">
                    <i class="bi bi-box-arrow-in-right me-2"></i>Entrar
                  </button>
                </div>

                <div class="text-center mt-4">
                  <span class="small text-muted">¿No tienes cuenta?</span>
                  <a class="small ms-1" href="registro.html">Crear cuenta</a>
                </div>
              </div>  
            </div>

          </div>
        </div>
      </div>
    </main>

    <script src="./wwwroot/js/jquery-4.0.0.min.js"></script>
    <script src="./wwwroot/js/script.js"></script>
  </body>
</html>
