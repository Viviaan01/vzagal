<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Registro - IngesTeam</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <style>
      :root {
        --pastel-pink: #fce4ec;
        --medium-pink: #f8bbd0;
        --dark-pink: #f06292;
        --text-pink: #880e4f;
      }

      body {
        background-color: var(--pastel-pink);
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      }

      #main {
        width: 100%;
      }

      .register-card {
        background: white;
        border: none !important;
        border-radius: 20px !important;
        box-shadow: 0 10px 25px rgba(240, 98, 146, 0.15) !important;
      }

      .display-6 {
        color: var(--text-pink);
        font-weight: 800 !important; /* Título en negritas */
        margin-bottom: 20px;
      }

      .form-label {
        color: var(--text-pink);
        font-weight: 600;
        font-size: 0.9rem;
      }

      /* Estilo de inputs alineados y foco rosa */
      .form-control {
        border: 1px solid var(--medium-pink);
        border-radius: 10px;
      }

      .form-control:focus {
        border-color: var(--dark-pink) !important;
        box-shadow: 0 0 0 0.25rem rgba(240, 98, 146, 0.25) !important;
        outline: none;
      }

      .btn-pastel {
        background-color: var(--dark-pink);
        color: white;
        border: none;
        font-weight: bold;
        border-radius: 25px;
        padding: 10px 25px;
        transition: 0.3s;
      }

      .btn-pastel:hover {
        background-color: #e91e63;
        color: white;
        transform: scale(1.05);
      }

      a {
        color: var(--dark-pink);
        text-decoration: none;
        font-weight: 600;
      }

      a:hover {
        color: var(--text-pink);
        text-decoration: underline;
      }

      .text-muted {
        color: #ad748e !important;
      }
    </style>
  </head>
  <body>
    <main id="main">
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-md-7 col-lg-5">
            
            <div class="register-card p-5">
              <div class="w-100 text-center">
                <h1 class="display-6">Regístrate</h1>
              </div>

              <div class="col-12 mt-3">
                <div class="mb-3">
                  <label for="nombre" class="form-label">Nombre completo</label>
                  <div class="input-group">
                    <span class="input-group-text bg-white border-end-0" style="border-color: var(--medium-pink); border-radius: 10px 0 0 10px;">
                      <i class="bi bi-person-fill" style="color: var(--dark-pink);"></i>
                    </span>
                    <input class="form-control border-start-0" id="nombre" placeholder="Tu nombre" style="border-radius: 0 10px 10px 0;">
                  </div>
                </div>

                <div class="mb-3">
                  <label for="email" class="form-label">Email</label>
                  <div class="input-group">
                    <span class="input-group-text bg-white border-end-0" style="border-color: var(--medium-pink); border-radius: 10px 0 0 10px;">
                      <i class="bi bi-envelope-fill" style="color: var(--dark-pink);"></i>
                    </span>
                    <input type="email" class="form-control border-start-0" id="email" placeholder="correo@ejemplo.com" style="border-radius: 0 10px 10px 0;">
                  </div>
                </div>

                <div class="mb-4">
                  <label for="pwd" class="form-label">Contraseña</label>
                  <div class="input-group">
                    <span class="input-group-text bg-white border-end-0" style="border-color: var(--medium-pink); border-radius: 10px 0 0 10px;">
                      <i class="bi bi-lock-fill" style="color: var(--dark-pink);"></i>
                    </span>
                    <input class="form-control border-start-0" type="password" id="pwd" placeholder="••••••••" style="border-radius: 0 10px 10px 0;">
                  </div>
                </div>

                <div class="d-flex justify-content-between align-items-center py-3">
                  <div>
                    <span class="small text-muted d-block">¿Ya tienes cuenta?</span>
                    <a class="small" href="index.html">Iniciar sesión</a>
                  </div>
                  <button class="btn btn-pastel" onclick="registroUsuarios();">
                    <i class="bi bi-person-plus-fill me-2"></i>Registrar
                  </button>
                </div>
              </div>  
            </div>

          </div>
        </div>
      </div>
    </main>

    <script src="./wwwroot/js/jquery-4.0.0.min.js"></script>
    <script src="./wwwroot/js/script.js"></script>
  </body>
</html>
